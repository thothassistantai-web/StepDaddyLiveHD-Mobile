<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StepDaddy LiveHD - Channel Picker</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --muted:#9aa4b2; --accent:#dc2626; --line:#2a2f3a; --ok:#16a34a; }
    body { font-family: Inter, Arial, sans-serif; margin: 0; background:var(--bg); color:#eef2f7; }
    .wrap { max-width: 1024px; margin: 0 auto; padding: 14px; }
    .top { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    input, button { font-size:16px; padding:10px; border-radius:10px; border:1px solid #3a4150; background:#1b1f28; color:#fff; }
    input { flex:1; min-width:220px; }
    button { cursor:pointer; }
    .btn { background:var(--accent); border:none; }
    .meta { color:var(--muted); font-size:12px; margin-top:8px; }
    .panel { margin-top:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    #list { max-height: 190px; overflow:auto; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid #222936; }
    .row:last-child{border-bottom:none}
    .row button { background:#b91c1c; border:none; padding:6px 10px; border-radius:8px; }
    .playing-tag { font-size:10px; color:#fff; background:var(--ok); padding:2px 6px; border-radius:999px; margin-left:6px; }
    .video-wrap { margin-top:12px; }
    video { width:100%; background:black; border-radius:12px; border:1px solid var(--line); }
    .epg-now { margin-top:8px; font-size:13px; color:#d7e2f0; background:#141a24; border:1px solid #253247; border-radius:10px; padding:8px 10px; }
    .epg-next { margin-top:4px; font-size:12px; color:#9fb0c7; }
    .section-title { margin:14px 0 8px; font-size:16px; color:#dbe3ee; }
    #logos { display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:10px; }
    .logo-card { background:#171b24; border:1px solid #293142; border-radius:12px; padding:7px; text-align:center; cursor:pointer; transition:.15s; }
    .logo-card:hover { transform:translateY(-1px); border-color:#3b465c; }
    .logo-card.active { border-color:var(--ok); box-shadow:0 0 0 1px var(--ok) inset; }
    .logo-card img { width:56px; height:56px; object-fit:contain; display:block; margin:0 auto 5px; }
    .logo-name { font-size:10px; color:#cfd8e3; line-height:1.25; height:25px; overflow:hidden; }
    .logo-epg { font-size:9px; color:#8fa4bf; line-height:1.2; height:22px; overflow:hidden; margin-top:3px; }
    .pill { font-size:11px; color:#9fb0c7; background:#131821; border:1px solid #243046; padding:3px 8px; border-radius:999px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:4px 0 8px;">StepDaddy LiveHD</h2>
    <div class="top">
      <input id="q" placeholder="Search channels by name..." />
      <button class="btn" onclick="loadChannels()">Refresh</button>
      <span class="pill" id="countPill">--</span>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;"><button class="btn" onclick="shareCurrent(7200)">Share 2h</button><button class="btn" onclick="shareCurrent(86400)">Share 24h</button></div>
    <div id="meta" class="meta">Loading channels...</div>

    <div class="panel"><div id="list"></div></div>

    <div class="video-wrap">
      <video id="v" controls autoplay playsinline></video>
      <div id="epgNow" class="epg-now">EPG: Select a channel to load now/next.</div>
      <div id="epgNext" class="epg-next"></div>
    </div>

    <h3 class="section-title">Browse Channels</h3>
    <div id="logos"></div>
  </div>
<script>
let channels = [];
let currentId = null;
const epgCache = new Map();
const list = document.getElementById('list');
const q = document.getElementById('q');
const meta = document.getElementById('meta');
const countPill = document.getElementById('countPill');
const v = document.getElementById('v');
const logos = document.getElementById('logos');
const epgNow = document.getElementById('epgNow');
const epgNext = document.getElementById('epgNext');

async function loadChannels(){
  try {
    meta.textContent = 'Loading channels...';
    const res = await fetch('/channels?include_dead=false');
    if (!res.ok) throw new Error('Failed to load channels');
    channels = await res.json();
    countPill.textContent = `${channels.length} channels`;
    render();
  } catch (e) {
    meta.textContent = 'Channel load failed. Tap Refresh.';
  }
}

async function fetchNowNext(channelId){
  if (epgCache.has(channelId)) return epgCache.get(channelId);
  try {
    const r = await fetch(`/epg/now-next/${channelId}`);
    if (!r.ok) return null;
    const data = await r.json();
    epgCache.set(channelId, data);
    return data;
  } catch {
    return null;
  }
}

function render(){
  const s = (q.value || '').toLowerCase().trim();
  const filtered = channels.filter(c => c.name.toLowerCase().includes(s));

  list.innerHTML = '';
  filtered.slice(0, 500).forEach(c => {
    const row = document.createElement('div');
    row.className = 'row';
    const playing = currentId === c.id ? '<span class="playing-tag">PLAYING</span>' : '';
    row.innerHTML = `<div>${c.name}${playing}</div><button data-id="${c.id}">Watch</button>`;
    row.querySelector('button').onclick = () => play(c.id, c.name);
    list.appendChild(row);
  });

  meta.textContent = `Showing ${Math.min(filtered.length, 500)} / ${filtered.length} matches`;
  renderLogos(filtered);
}

function renderLogos(filtered){
  logos.innerHTML = '';
  filtered.slice(0, 300).forEach(c => {
    const d = document.createElement('div');
    d.className = 'logo-card' + (currentId === c.id ? ' active' : '');
    const logo = c.logo || '';
    const epgLine = epgCache.get(c.id)?.now?.title || 'EPG pending...';
    d.innerHTML = `<img src="${logo}" alt="${c.name}" onerror="this.style.opacity=0.25"/><div class="logo-name">${c.name}</div><div class="logo-epg">${epgLine}</div>`;
    d.onclick = () => play(c.id, c.name);
    logos.appendChild(d);
  });
}

async function shareCurrent(ttl){
  if(!currentId){ alert('Select a channel first'); return; }
  const r=await fetch(`/share/create?channel_id=${currentId}&ttl_seconds=${ttl}`,{method:'POST'});
  const d=await r.json();
  const url=d.watch_url||'';
  try{ await navigator.clipboard.writeText(url); meta.textContent=`Share link copied: ${url}`; }catch{ prompt('Copy share link', url); }
}

async function play(id, name){
  currentId = id;
  const url = `/stream/${id}.m3u8`;
  if (window.Hls && Hls.isSupported()) {
    if (window._hls) window._hls.destroy();
    const hls = new Hls();
    window._hls = hls;
    hls.loadSource(url);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url;
    v.play().catch(() => {});
  } else {
    alert('No HLS support in this player/browser.');
  }

  const epg = await fetchNowNext(id);
  if (epg && epg.now) {
    epgNow.textContent = `Now: ${epg.now.title || 'Unknown'}${epg.now.start ? ` (${epg.now.start} - ${epg.now.stop || ''})` : ''}`;
    epgNext.textContent = epg.next ? `Next: ${epg.next.title || 'Unknown'}${epg.next.start ? ` (${epg.next.start})` : ''}` : 'Next: n/a';
  } else {
    epgNow.textContent = `EPG: No now/next data for ${name}`;
    epgNext.textContent = '';
  }

  meta.textContent = `Playing: ${name} (${id})`;
  render();
}

q.addEventListener('input', render);
loadChannels();
</script>
</body>
</html>
